name: Publish to npm

# Publishes @anroagents/mcp-server to npm when a `v*` tag is pushed.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN in repo secrets, no
# long-lived credentials. Requires the package to have a Trusted Publisher
# configured on npmjs.com pointing at:
#     Repo:     Anrotech/anroagents-mcp
#     Workflow: .github/workflows/publish.yml
#     Environment: (none, or 'production' if you want an approval gate)
#
# Bumping & releasing:
#   npm version minor          # or major / patch — updates package.json + tags
#   git push && git push --tags
# The tag push triggers this workflow.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # required for npm Trusted Publishing (OIDC)
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # NOTE: no registry-url — setup-node would inject _authToken=${NODE_AUTH_TOKEN}
          # into .npmrc; with no secret that fails auth before OIDC kicks in.
          node-version: '24'

      - name: Upgrade npm for Trusted Publishing (OIDC support in npm >=11.5)
        # setup-node on runners ships npm 10.x by default. Upgrading via corepack
        # avoids the 'Cannot find module promise-retry' issue you get with a
        # plain `npm install -g npm@latest`.
        run: |
          corepack enable
          corepack prepare npm@11.5.1 --activate
          npm --version

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [[ "$TAG" != "$PKG" ]]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing @anroagents/mcp-server@$PKG"

      - name: Publish with provenance (Trusted Publishing)
        run: npm publish --provenance --access public
